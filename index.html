<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدكتور | IZ company</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader"><div class="loader-brand">IZ company</div></div>
    <header>
        <div class="logo">منصة الدكتور</div>
        <nav><a href="#">تواصل معنا</a></nav>
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>منصة الدكتور للعلوم العربية</h1>
            <p>تعلم اللغة العربية بأحدث الأساليب التقنية</p>
            <a href="#lectures-area" class="main-btn">ابدأ رحلتك الآن</a>
        </div>
    </section>
    <section id="lectures-area">
        <div class="folder-tabs">
            <button class="tab-btn active" onclick="filterLectures('all', event)">الكل</button>
            <button class="tab-btn" onclick="filterLectures('nahw', event)">النحو</button>
            <button class="tab-btn" onclick="filterLectures('balagha', event)">البلاغة</button>
        </div>
        <main class="grid-container">
            <div class="card" data-category="nahw">
                <div class="video-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
                <div class="card-info"><h3>كان وأخواتها</h3><p>شرح مبسط لقواعد الأفعال الناقصة.</p></div>
            </div>
        </main>
    </section>
    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026</p>
        <div class="dev-box"><span class="company-name">IZ company</span></div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
